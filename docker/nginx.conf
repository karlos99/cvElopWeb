# docker/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# nginx config that mirrors Hostinger's shared / cloud hosting behaviour:
#   • Gzip compression
#   • Correct MIME types (WASM, SQLite .db, fonts, images)
#   • Sensible cache headers (html no-cache, assets long-lived)
#   • Security headers matching Hostinger defaults
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Charset / encoding ───────────────────────────────────────────────────
    charset utf-8;

    # ── Gzip (Hostinger has gzip on by default) ──────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── MIME types ───────────────────────────────────────────────────────────
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/svg+xml                         svg;
        image/webp                            webp;
        image/x-icon                          ico;
        application/wasm                      wasm;
        application/octet-stream              db;
        font/woff                             woff;
        font/woff2                            woff2;
        application/font-ttf                  ttf;
    }

    # ── Cache control ────────────────────────────────────────────────────────

    # HTML — no cache (always fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # app.db — short cache (allow re-seeding when db is rebuilt)
    location = /app.db {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type  "application/octet-stream";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # JS / CSS — no-cache so browser always fetches latest
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Images / fonts / wasm — cache 7 days
    location ~* \.(png|jpg|jpeg|svg|webp|ico|woff|woff2|ttf|wasm)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Security headers (Hostinger defaults) ────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # ── Error pages ──────────────────────────────────────────────────────────
    error_page 404 /index.html;   # single-page app — fall back to index
    error_page 500 502 503 504 /index.html;
}
