services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ases-tournament-manager
    ports:
      - "8080:80"          # http://localhost:8080  (mirrors Hostinger port 80)
    volumes:
      # Live-reload during development: mount source files into the container.
      # Comment these out for a production-faithful immutable image.
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./app.db:/usr/share/nginx/html/app.db:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout:  5s
      retries:  3
